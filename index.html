<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta http-equiv="content-type" content="text/html;charset=utf-8">
    <meta name="keywords" content="JavaScript,carousel,mobile,touch,slide">
    <meta name="description" content="JavaScript touch carousel with zero dependencies">
    <title>ItemSlide.js - JavaScript touch carousel</title>
	<style>
	body {
		font-family: calibri, sans-serif;
		text-align: center;
		margin: 0;
		height: 98vh;
		background-color: #8601AF;
	}

	#header {
		width: 100%;
		padding-top: 5px;
		padding-bottom: 5px;
		background-color: #FEFE33;
		text-align: center;
	}

	#headertext {
		text-decoration: none;
		color: #8601AF;
		font-size: 6.5vh;
		font-weight: 400;
	}

	#about {
		width: 90%;
		margin-left: auto;
		margin-right: auto;
		font-size: 5vh;
		color: white;
	}

	#about a {
		font-size: 3.5vh;
		color: white;
	}

	#footer {
		position: fixed;
		font-size: 2.5vh;
		bottom: 0%;
		padding: 0.5%;
		background-color: #8601AF;
		font-weight: 200;
		color: white;
		right: 0;
		left: 0;
	}

	#footer .hrefs {
		color: #FFF;
		font-weight: 400;
		text-decoration: none;
	}

	#scrolling {
		background: #8601AF;
		height: 58%;
		width: 100%;
		overflow: hidden;
	}

	#scrolling ul {
		user-select: none;
		margin: 0;
		padding: 0;
		margin-top: 3%;
		height: 80%;
		list-style-type: none;
		transform-style: preserve-3d;
	}

	#scrolling ul li {
		font-size: 30vh;
		float: left;
		width: 55vw;
		max-width: 750px;
		height: 100%;
		color: #8601AF;
		font-weight: 300;
		text-align: center;
		border-radius: 30px;
		cursor: pointer;
		background: white;
		transform: scale(0.95);
	}

	#scrolling ul .itemslide-active {
		transform: scale(1);
	}
	</style>
    <script src="itemslide.js"></script>
	<script>
		var itemslide;
		window.addEventListener("load", function () {
			var element = document.querySelector("#scrolling ul");
			itemslide = new Itemslide(element, {
				swipeOut: true
			});
		});

		window.addEventListener("resize", function () {
			itemslide.reload();
		});
	</script>
</head>
<body>
    <div id="header">
        <a id="headertext" href="index.html">
            ItemSlide.js
        </a>
    </div>
	<div id="about">
		<br>
		JavaScript Carousel Library
		<br>
		<br>
		<a id="github" href="https://github.com/nir9/itemslide">
			Source on Github
		</a>
	</div>
    <div id="scrolling">
        <ul>
            <li>
				1
            </li>
            <li>
				2
            </li>
            <li>
				3
            </li>
            <li>
				4
            </li>
        </ul>
    </div>
    <div id="footer">
        Created by <a class="hrefs" href="https://github.com/nir9">Nir Lichtman</a>
    </div>
</body>
</html>
